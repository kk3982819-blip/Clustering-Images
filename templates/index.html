<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelDwell AI Photo Editing Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #080e1a;
  --surface:   #111827;
  --card:      #1a2236;
  --border:    rgba(255,255,255,.08);
  --primary:   #3b82f6;
  --purple:    #8b5cf6;
  --accent:    #10b981;
  --gold:      #f59e0b;
  --danger:    #ef4444;
  --txt:       #f1f5f9;
  --muted:     #64748b;
  --light:     #94a3b8;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--txt);
  min-height: 100vh;
}

/* ── Topbar ────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px 40px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,14,26,.9);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo-mark {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--purple));
  display: grid; place-items: center;
}
.logo-mark svg { width: 20px; height: 20px; }
header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -.3px; }
header span { font-weight: 300; color: var(--muted); margin-left: 6px; font-size: .85rem; }

/* ── Main layout ───────────────────────────────────────────────── */
main {
  max-width: 1300px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ── Step pills ────────────────────────────────────────────────── */
.steps {
  display: flex;
  gap: 0;
  margin-bottom: 40px;
  border-radius: 14px;
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
}
.step {
  flex: 1;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: .85rem;
  font-weight: 500;
  color: var(--muted);
  cursor: default;
  transition: all .3s;
  border-right: 1px solid var(--border);
  position: relative;
}
.step:last-child { border-right: none; }
.step-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--border);
  display: grid; place-items: center;
  font-size: .75rem; font-weight: 700;
  flex-shrink: 0;
  transition: all .3s;
}
.step.active { color: var(--txt); }
.step.active .step-num { background: var(--primary); color: #fff; }
.step.done .step-num { background: var(--accent); color: #fff; }
.step.done { color: var(--light); }

/* ── Upload Zone ───────────────────────────────────────────────── */
#uploadSection { display: block; }

.drop-zone {
  border: 2px dashed rgba(59,130,246,.35);
  border-radius: 20px;
  padding: 70px 40px;
  text-align: center;
  cursor: pointer;
  transition: all .25s;
  background: rgba(59,130,246,.03);
  position: relative;
}
.drop-zone:hover, .drop-zone.over {
  border-color: var(--primary);
  background: rgba(59,130,246,.08);
}
.drop-zone input { display: none; }
.drop-icon { margin-bottom: 20px; }
.drop-icon svg { width: 52px; height: 52px; stroke: var(--primary); opacity: .8; }
.drop-label { font-size: 1.15rem; font-weight: 600; margin-bottom: 8px; }
.drop-sub { color: var(--muted); font-size: .875rem; }
.file-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(16,185,129,.15);
  color: var(--accent);
  border: 1px solid rgba(16,185,129,.3);
  border-radius: 30px;
  padding: 6px 16px;
  font-size: .8rem; font-weight: 600;
  margin-top: 16px;
}

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  border: none; cursor: pointer;
  border-radius: 12px; font-family: inherit;
  font-weight: 600; transition: all .2s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--purple));
  color: #fff; padding: 14px 32px; font-size: 1rem;
  width: 100%; justify-content: center; margin-top: 24px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,.4); }
.btn-primary:disabled { opacity: .45; transform: none; cursor: not-allowed; }

.btn-sm {
  background: linear-gradient(135deg, var(--accent), #059669);
  color: #fff; padding: 9px 20px; font-size: .82rem;
  border-radius: 8px;
}
.btn-sm:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(16,185,129,.35); }
.btn-sm:disabled { opacity: .45; cursor: not-allowed; transform: none; }

/* ── Loader ────────────────────────────────────────────────────── */
.loader-row {
  display: none; flex-direction: column;
  align-items: center; gap: 16px; padding: 48px 0;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(59,130,246,.2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-msg { color: var(--light); font-size: .9rem; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

/* ── Cluster Results Section ───────────────────────────────────── */
#clustersSection { display: none; }

.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.section-title { font-size: 1.25rem; font-weight: 700; }
.section-count {
  background: rgba(59,130,246,.15);
  border: 1px solid rgba(59,130,246,.3);
  color: var(--primary);
  border-radius: 30px;
  padding: 4px 14px; font-size: .8rem; font-weight: 600;
}

.clusters-grid {
  display: flex;
  justify-content: center;
}

/* ── Cluster Nav ───────────────────────────────────────────────── */
.cluster-nav {
  display: flex; gap: 10px; overflow-x: auto; margin-bottom: 24px; padding-bottom: 8px;
}
.cluster-nav::-webkit-scrollbar { height: 4px; }
.cluster-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

.cluster-nav-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--txt);
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 0.9rem;
  font-weight: 500;
  transition: all .2s;
}
.cluster-nav-btn:hover {
  background: rgba(59,130,246,0.1);
  border-color: rgba(59,130,246,0.5);
}
.cluster-nav-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}

/* ── Cluster Card ──────────────────────────────────────────────── */
.cluster-card {
  width: 100%;
  max-width: 600px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
  animation: fadeUp .4s ease-out both;
  display: none; /* hidden by default, toggled by JS */
}
.cluster-card.active {
  display: block;
}
.cluster-card:hover {
  border-color: rgba(59,130,246,.35);
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(16px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Cluster Card Hero & Gallery ───────────────────────────────── */
.hero-container {
  position: relative;
  width: 100%;
  height: 240px;
  background: #000;
  overflow: hidden;
}
.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.3s ease;
}
.detection-toggle {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(17, 24, 39, 0.8);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  z-index: 10;
}
.detection-toggle:hover {
  background: rgba(59, 130, 246, 0.8);
  border-color: rgba(59, 130, 246, 0.5);
}
.detection-toggle.active {
  background: rgba(16, 185, 129, 0.8);
  border-color: rgba(16, 185, 129, 0.5);
}

/* thumbnail filmstrip */
.thumb-strip {
  display: flex;
  gap: 2px;
  height: 60px;
  overflow-x: auto;
  background: #0a0f1d;
  padding: 2px;
}
.thumb-strip::-webkit-scrollbar { height: 4px; }
.thumb-strip::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

.thumb-strip img {
  flex: 0 0 auto;
  width: 90px;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
  opacity: 0.6;
  transition: all 0.2s;
  border-radius: 4px;
}
.thumb-strip img:hover { opacity: 0.9; }
.thumb-strip img.active {
  opacity: 1;
  border: 2px solid var(--primary);
}

/* card body */
.card-body { padding: 18px; }
.card-title {
  font-size: .9rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--light);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.cluster-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--primary); flex-shrink: 0;
}

/* detections tag cloud */
.detections-section { margin-bottom: 16px; }
.det-label { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
.tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: .72rem;
  color: var(--light);
  transition: all .2s;
}
.tag.structural { 
  background: rgba(245,158,11,.08); 
  border-color: rgba(245,158,11,.25); 
  color: var(--gold); 
}
.tag.object { 
  background: rgba(59,130,246,.08); 
  border-color: rgba(59,130,246,.25); 
  color: #93c5fd; 
}
.tag.scene { 
  background: rgba(16,185,129,.08); 
  border-color: rgba(16,185,129,.25); 
  color: #6ee7b7; 
}

/* HDR feature checkboxes */
.feature-options { margin-bottom: 16px; }
.feat-label { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
.feat-list { display: flex; flex-wrap: wrap; gap: 6px; }
.feat-item {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: .72rem; color: var(--light);
  cursor: pointer; transition: all .2s;
}
.feat-item:hover { background: rgba(139,92,246,.1); border-color: var(--purple); }
.feat-item input { accent-color: var(--purple); width: 12px; height: 12px; }

/* card footer */
.card-footer { padding: 0 18px 18px; }
.hdr-result {
  margin-top: 12px;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  display: none;
}
.hdr-result img { width: 100%; display: block; }
.hdr-badge {
  position: absolute; top: 8px; left: 8px;
  background: rgba(16,185,129,.9);
  color: #fff; border-radius: 6px;
  padding: 3px 8px; font-size: .7rem; font-weight: 700;
  letter-spacing: .5px;
}
.card-loader {
  display: none; align-items: center; gap: 10px;
  padding: 10px 0; color: var(--muted); font-size: .8rem;
}
.card-spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

/* ── Lightbox ──────────────────────────────────────────────────── */
#lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.85); backdrop-filter: blur(6px);
  z-index: 999; place-items: center;
}
#lightbox.open { display: grid; }
#lightbox img {
  max-width: 90vw; max-height: 88vh;
  border-radius: 12px;
  box-shadow: 0 30px 80px rgba(0,0,0,.8);
}
#lightbox-close {
  position: absolute; top: 20px; right: 28px;
  background: rgba(255,255,255,.12); border: none; color: #fff;
  width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem;
  cursor: pointer; display: grid; place-items: center;
}
</style>
</head>
<body>

<!-- ── Topbar ── -->
<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M3 9h18M9 21V9"/>
    </svg>
  </div>
  <h1>PixelDwell <span>AI Photo Editing Platform</span></h1>
  <div style="flex-grow: 1;"></div>
  <button class="btn btn-back" style="border-radius: 8px; font-size: 0.8rem; padding: 8px 16px;" onclick="resetProject()">
    ↺ Start New Project
  </button>
</header>

<!-- ── Progress Steps ── -->
<main>
  <div class="steps">
    <div class="step active" id="step1">
      <div class="step-num">1</div>
      Upload Photos
    </div>
    <div class="step" id="step2">
      <div class="step-num">2</div>
      Scene Clustering
    </div>
    <div class="step" id="step3">
      <div class="step-num">3</div>
      HDR Enhancement
    </div>
  </div>

  <!-- ── Section 1: Upload ── -->
  <div id="uploadSection">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="drop-label">Drop all property photos here</div>
      <div class="drop-sub">JPEG or PNG · Mix all rooms & exposures · The AI will sort everything</div>
      <div class="file-badge" id="fileBadge" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="fileCount"></span>
      </div>
    </div>

    <button class="btn btn-primary" id="clusterBtn" disabled onclick="startClustering()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Analyse & Cluster Scenes
    </button>

    <div class="loader-row" id="clusterLoader">
      <div class="spinner"></div>
      <div class="loader-msg" id="clusterMsg">Running CLIP scene clustering engine…</div>
    </div>
  </div>

  <!-- ── Section 2: Cluster Results ── -->
  <div id="clustersSection">
    <div class="section-header">
      <h2 class="section-title">Detected Scene Clusters</h2>
      <div class="section-count" id="clusterCount">0 viewpoints</div>
    </div>
    <div class="cluster-nav" id="clusterNav"></div>
    <div class="clusters-grid" id="clustersGrid"></div>
  </div>
</main>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ── Drag-drop wiring ────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const clusterBtn = document.getElementById('clusterBtn');
let selectedFiles = null;

// ── Restore Latest Session ──────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const res = await fetch('/latest-job');
    const data = await res.json();
    if (data.clusters && data.clusters.length > 0) {
      renderClusters(data.clusters);
    }
  } catch (err) {
    console.error('Failed to load latest job:', err);
  }
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  fileInput.files = e.dataTransfer.files; reflectFiles();
});
fileInput.addEventListener('change', reflectFiles);

function reflectFiles() {
  selectedFiles = fileInput.files;
  const n = selectedFiles.length;
  document.getElementById('fileBadge').style.display = n > 0 ? 'inline-flex' : 'none';
  document.getElementById('fileCount').textContent = `${n} image${n !== 1 ? 's' : ''} selected`;
  clusterBtn.disabled = n === 0;
}

// ── Step indicator helpers ──────────────────────────────────────
function setStep(n) {
  ['step1','step2','step3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step' + (i+1 < n ? ' done' : i+1 === n ? ' active' : '');
  });
}

// ── Phase 1: Upload & Cluster ───────────────────────────────────
async function startClustering() {
  if (!selectedFiles || selectedFiles.length === 0) return;

  clusterBtn.disabled = true;
  document.getElementById('clusterLoader').style.display = 'flex';
  setStep(2);

  const form = new FormData();
  for (const f of selectedFiles) form.append('files', f);

  const msgs = [
    'Loading CLIP ViT-B/32 model…',
    'Computing semantic embeddings…',
    'Running HDBSCAN scene clustering…',
    'Running same-corner refinement…',
    'Detecting objects & scene labels…',
    'Almost done…',
  ];
  let mi = 0;
  const msgEl = document.getElementById('clusterMsg');
  const msgInterval = setInterval(() => {
    if (mi < msgs.length - 1) msgEl.textContent = msgs[++mi];
  }, 4000);

  try {
    const res = await fetch('/upload-and-cluster', { method: 'POST', body: form });
    const data = await res.json();
    clearInterval(msgInterval);

    if (data.error) {
      alert('Error: ' + data.error);
      clusterBtn.disabled = false;
      setStep(1);
    } else {
      renderClusters(data.clusters);
    }
  } catch (err) {
    clearInterval(msgInterval);
    alert('Request failed: ' + err.message);
    clusterBtn.disabled = false;
    setStep(1);
  } finally {
    document.getElementById('clusterLoader').style.display = 'none';
  }
}

// ── Render cluster cards ────────────────────────────────────────
const STRUCTURAL = new Set(['ceiling','wall','floor','door','window','sliding glass door','kitchen cabinet','countertop','kitchen island','balcony']);
const SCENE_TAGS  = new Set(['sky','cloud','green grass','trees','balcony','outdoor view','white wall','floor tiles','sunray','light ray','sunlight patch','sunlit floor','light spill','sunlight reflection','golden hour lighting','specular reflection','cast shadows','window light projection']);

function tagClass(t) {
  if (STRUCTURAL.has(t)) return 'structural';
  if (SCENE_TAGS.has(t))  return 'scene';
  return 'object';
}

// ── Reset Project ───────────────────────────────────────────────
function resetProject() {
  if (confirm("This will clear the current results. Start a new project?")) {
    document.getElementById('uploadSection').style.display = 'block';
    document.getElementById('uploadSection').querySelector('.btn-primary').style.display = 'flex';
    document.getElementById('clustersSection').style.display = 'none';
    document.getElementById('fileBadge').style.display = 'none';
    document.getElementById('clusterBtn').disabled = true;
    selectedFiles = null;
    fileInput.value = '';
    setStep(1);
    // Refresh to clear any server-side latest-job cache if needed, 
    // but just UI reset is usually enough for the user.
  }
}

function renderClusters(clusters) {
  document.getElementById('uploadSection').querySelector('.btn-primary').style.display = 'none';
  document.getElementById('clustersSection').style.display = 'block';
  document.getElementById('clusterCount').textContent = `${clusters.length} viewpoint${clusters.length !== 1 ? 's' : ''}`;

  const nav = document.getElementById('clusterNav');
  const grid = document.getElementById('clustersGrid');
  if (nav) nav.innerHTML = '';
  grid.innerHTML = '';
  setStep(3);

  clusters.forEach((c, idx) => {
    // Generate simple preview card
    const firstThumb = c.thumbnails && c.thumbnails.length > 0 ? c.thumbnails[0].original : '';
    const card = document.createElement('div');
    card.className = 'cluster-card';
    card.style.display = 'block';
    card.style.cursor = 'pointer';
    card.style.animationDelay = `${idx * 80}ms`;
    card.onclick = () => {
      window.location.href = `/job/${c.job_id}/cluster/${c.id}`;
    };

    const tagsHtml = (c.tags || []).slice(0, 3).map(t => `<span class="tag ${tagClass(String(t).toLowerCase())}">${t}</span>`).join('');

    card.innerHTML = `
      <div class="hero-container" style="height: 180px;">
        <img src="${firstThumb}?t=${Date.now()}" class="hero-img" alt="">
        <div style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;">
          ${c.thumbnails ? c.thumbnails.length : 0} Images
        </div>
      </div>
      <div class="card-body">
        <div class="card-title" style="margin-bottom: 6px;">
          <span class="cluster-dot"></span>
          ${c.id.replace('_', ' ')}
        </div>
        <div class="tag-cloud" style="margin-top: 10px;">
          ${tagsHtml}
          ${(c.tags && c.tags.length > 3) ? `<span class="tag" style="background:transparent;border:none;">+${c.tags.length - 3} more</span>` : ''}
        </div>
        <button class="btn btn-primary" style="margin-top: 16px; padding: 10px; font-size: 0.85rem;">View Cluster →</button>
      </div>
    `;
    grid.appendChild(card);
  });
}





// ── Lightbox ────────────────────────────────────────────────────
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});
</script>
</body>
</html>
